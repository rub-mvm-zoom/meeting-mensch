<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meeting</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  overflow: hidden;
}

/* ===== SCREENS ===== */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

.white {
  background: white;
  color: #0b5cff;
}

/* Loader */
.spinner {
  border: 6px solid #ddd;
  border-top: 6px solid #0b5cff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Button */
.join-btn {
  margin-top: 20px;
  padding: 12px 28px;
  background: #0b5cff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

/* ===== VIDEO ===== */
video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  display: none; /* WICHTIG */
}

/* ===== CONTROLS ===== */
.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 85px;
  background: #000;
  display: none; /* WICHTIG */
  justify-content: space-between;
  align-items: center;
  padding: 0 35px;
  box-sizing: border-box;
  z-index: 20;
}

.left, .center, .right {
  display: flex;
  align-items: center;
  gap: 22px;
}

.btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 17px;
  color: #ccc;
  transition: all 0.15s;
}

.btn span {
  font-size: 12px;
  margin-top: 4px;
}

.btn:hover {
  color: white;
  transform: translateY(-2px);
}

.icon-row {
  display: flex;
  align-items: center;
  gap: 4px;
}

.arrow {
  font-size: 10px;
  opacity: 0.7;
}

.icon-wrap {
  position: relative;
}

.badge {
  position: absolute;
  top: -6px;
  right: -10px;
  background: #444;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
}

.green span {
  color: #4cff4c;
}

.leave {
  background: #e02828;
  padding: 10px 18px;
  border-radius: 6px;
  color: white;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen white" id="loading">
  <div class="spinner"></div>
  <h2>Verbindung wird hergestellt…</h2>
</div>

<!-- SCREEN 2 -->
<div class="screen white" id="join" style="display:none;">
  <h2>Sie treten dem Meeting bei</h2>
  <div class="join-btn" onclick="startMeeting()">Beitreten</div>
</div>

<!-- VIDEO -->
<video id="video">
  <source src="meeting-mensch.mp4" type="video/mp4">
</video>

<!-- CONTROLS -->
<div class="controls" id="controls">

  <div class="left">
    <div class="btn">
      <div class="icon-row">🎤 <span class="arrow">▾</span></div>
      <span>Stummschalten</span>
    </div>

    <div class="btn">
      <div class="icon-row">🎥 <span class="arrow">▾</span></div>
      <span>Video stoppen</span>
    </div>

    <div class="btn">🛡<span>Sicherheit</span></div>

    <div class="btn icon-wrap">
      <div class="icon-row">👥 <span class="arrow">▾</span></div>
      <span>Teilnehmer</span>
      <div class="badge">7</div>
    </div>
  </div>

  <div class="center">
    <div class="btn green">
      ⬆<span>Bildschirm freigeben</span>
    </div>
  </div>

  <div class="right">
    <div class="btn">💬<span>Chat</span></div>
    <div class="btn">⏺<span>Aufzeichnen</span></div>
    <div class="btn">😊<span>Reaktionen</span></div>
    <div class="btn leave"><span>Beenden</span></div>
  </div>

</div>

<script>
const loading = document.getElementById("loading");
const join = document.getElementById("join");
const video = document.getElementById("video");
const controls = document.getElementById("controls");

/* Schritt 1 → 2 */
setTimeout(() => {
  loading.style.display = "none";
  join.style.display = "flex";
}, 2000);

/* Start */
function startMeeting() {
  join.style.display = "none";

  video.style.display = "block";
  controls.style.display = "flex";

  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  video.play();
}

/* Kein Vorspulen */
video.controls = false;

video.addEventListener("seeking", () => {
  video.currentTime = 0;
});

</script>

</body>
</html>
